<!DOCTYPE html>
<html>
<head>
    <title>Weather Prediction - Home</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; padding: 30px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        nav a { margin: 0 10px; text-decoration: none; color: #007bff; }
        nav a:hover { text-decoration: underline; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #dff0d8; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'about' %}">About</a>
            <a href="{% url 'contact' %}">Contact</a>
        </nav>
        <h2>🌤 Weather Prediction</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="temp" placeholder="Temperature (°C)" required>
            <input type="text" name="dew_point" placeholder="Dew Point (°C)" required>
            <input type="text" name="humidity" placeholder="Humidity (%)" required>
            <input type="text" name="wind_speed" placeholder="Wind Speed (km/h)" required>
            <input type="text" name="visibility" placeholder="Visibility (km)" required>
            <input type="text" name="pressure" placeholder="Pressure (kPa)" required>
            <button type="submit">Predict</button>
        </form>
        {% if results %}
        <div class="result">
            <h3>✅ Predicted Conditions:</h3>
            <ul>
                {% for r in results %}
                <li>{{ r }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
